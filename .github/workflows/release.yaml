name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (must already exist in ECR, e.g. 1.2.3)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - prod
          - both
        default: both

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  checks: write

env:
  ATMOS_PROFILE: github

jobs:
  promote:
    if: github.event_name == 'release'
    runs-on: ["ubuntu-latest"]
    container:
      image: ghcr.io/cloudposse/atmos:${{ vars.ATMOS_VERSION }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Install Docker CLI
        run: apt-get update && apt-get install -y docker.io bc

      - name: Checkout
        uses: actions/checkout@v6

      - name: AWS Auth
        run: |
          atmos auth env --identity plat-dev/terraform --format=github
          atmos auth login --identity plat-dev/terraform

      - uses: cloudposse/github-action-docker-promote@v1
        id: promote
        with:
          organization: cloudposse-examples
          repository: atmos-native-ci
          registry: ${{ vars.ECR_REGISTRY }}
          from: sha-${{ github.sha }}
          to: ${{ github.event.release.tag_name }}
          use_metadata: false

  deploy-staging:
    needs: [ promote ]
    if: >-
      always() &&
      (needs.promote.result == 'success' || needs.promote.result == 'skipped') &&
      (github.event_name == 'release' ||
       inputs.environment == 'staging' ||
       inputs.environment == 'both')
    runs-on: ["ubuntu-latest"]
    container:
      image: ghcr.io/cloudposse/atmos:${{ vars.ATMOS_VERSION }}
    name: deploy / staging
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy ECS Service
        id: deploy
        env:
          ATMOS_PROFILE: github
          APP_IMAGE: "${{ vars.ECR_REGISTRY }}/cloudposse-examples/atmos-native-ci:${{ github.event.release.tag_name || inputs.tag }}"
        run: |
          atmos terraform deploy app -s staging

  deploy-production:
    needs: [ deploy-staging ]
    if: >-
      always() &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped') &&
      (github.event_name == 'release' ||
       inputs.environment == 'prod' ||
       inputs.environment == 'both')
    runs-on: ["ubuntu-latest"]
    container:
      image: ghcr.io/cloudposse/atmos:${{ vars.ATMOS_VERSION }}
    name: deploy / production
    environment:
      name: prod
      url: ${{ steps.deploy.outputs.url }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy ECS Service
        id: deploy
        env:
          ATMOS_PROFILE: github
          APP_IMAGE: "${{ vars.ECR_REGISTRY }}/cloudposse-examples/atmos-native-ci:${{ github.event.release.tag_name || inputs.tag }}"
        run: |
          atmos terraform deploy app -s prod
