name: Preview Cleanup
on:
  pull_request:
    branches: ["main"]
    types: [closed, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  checks: write

jobs:
  cleanup:
    runs-on: ["ubuntu-latest"]
    container:
      image: ghcr.io/cloudposse/atmos:${{ vars.ATMOS_VERSION }}
    if: ${{ github.event.pull_request.state == 'closed' || !contains(github.event.pull_request.labels.*.name, 'deploy') }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Destroy ECS Service
        env:
          ATMOS_PROFILE: github
        run: |
          atmos terraform destroy app -s preview -auto-approve
