name: Main Branch
on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  statuses: write

jobs:
  test:
    runs-on: ["ubuntu-latest"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - name: Run tests
        working-directory: app
        run: go test -v ./...

  build:
    needs: [ test ]
    runs-on: ["ubuntu-latest"]
    steps:
      - name: Install Atmos
        uses: cloudposse/github-action-setup-atmos@v2
        with:
          install-wrapper: false
          atmos-version: ${{ vars.ATMOS_VERSION }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: ECR password
        shell: bash
        run: |
          atmos auth exec --identity plat-dev/terraform -- aws configure export-credentials --format env-no-export >> $GITHUB_ENV
        env:
          ATMOS_PROFILE: github
  
      - name: Mask ECR credentials
        shell: bash
        run: |
          echo "::mask::${{ env.AWS_SECRET_ACCESS_KEY }}"
          echo "::mask::${{ env.AWS_ACCESS_KEY_ID }}"
          echo "::mask::${{ env.AWS_SESSION_TOKEN }}"

      - name: Login to ECR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ECR_REGISTRY }}

      - name: Login to ECR Public
        uses: docker/login-action@v3
        with:
          registry: public.ecr.aws

      - name: Build
        id: build
        uses: cloudposse/github-action-docker-build-push@v2
        with:
          organization: cloudposse-examples
          repository: app-on-ecs-v2
          registry: ${{ vars.ECR_REGISTRY }}
          workdir: app

    outputs:
      image: ${{ steps.build.outputs.image }}
      tag: ${{ steps.build.outputs.tag }}
      
  deploy:
    needs: [ build ]
    runs-on: ["ubuntu-latest"]
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.output_url }}
    steps:
      - name: Install Atmos
        uses: cloudposse/github-action-setup-atmos@v2
        with:
          install-wrapper: false
          atmos-version: ${{ vars.ATMOS_VERSION }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy ECS Service
        shell: bash
        id: deploy
        env:
          APP_IMAGE: "${{ needs.build.outputs.image }}:${{ needs.build.outputs.tag }}"
          ATMOS_PROFILE: github
        run: |
          atmos terraform deploy app -s dev

  release:
    runs-on: ["ubuntu-latest"]
    needs: [ deploy ]
    steps:
      - name: Create/Update Draft release
        uses: release-drafter/release-drafter@v6
        with:
          publish: false
          prerelease: false
          config-name: configs/draft-release.yml
          commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
