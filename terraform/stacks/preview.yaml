import:
  - _default.yaml
  - defaults/app.yaml
  - deps/*

vars:
  stage: preview

terraform:
  auth:
    identities:
      plat-dev/terraform:
        default: true
  
components:
  terraform:
    vpc:
      metadata:
        terraform_workspace: "{{ .vars.tenant }}-{{ .vars.environment }}-dev"

    app:
      metadata:
        # Override Terraform workspace
        terraform_workspace: 'app-on-ecs-v2-{{ .atmos_stack }}-{{ .atmos_component }}-{{ env "PR_NUMBER" | default "0" }}'
      vars:
        attributes:
          - '{{ env "PR_NUMBER" | default "0" }}'
        service:
          enable_execute_command: true
